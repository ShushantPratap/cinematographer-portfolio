<!DOCTYPE html>
<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7ea6e55696.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>

<body>

    <div class="custom-cursor"></div>

    <div class="preloader">

        <div class="progress-bar-wrap">
            <div class="progress-bar"></div>
        </div>
    </div>

    <nav class="navbar navbar-expand-md fixed-top custom-nav">
        <div class="container-fluid px-5">
            <a class="navbar-brand text-white logo-text" href="index.html"><span class="text-danger">Anshu</span>
                Sood.</a>
            <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse"
                data-bs-target="#mynavbar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mynavbar">
                <div class="nav-links d-flex gap-4">
                    <a href="index.html#home" class="nav-item">Home</a>
                    <a href="index.html#about" class="nav-item">About</a>
                    <a href="index.html#portfolio" class="nav-item">Portfolio</a>

        </div>

    <section class="hero-section" style="height: 80vh;">
        <div class="hero-bg">
            <img src="img/videography.JPG" alt="Videography Banner">
            <div class="hero-overlay" style="background: rgba(0, 0, 0, 0.75);"></div>
        </div>
        <div class="hero-content container text-center">
            <h1 class="hero-title" style="font-size: 6vw;">MOTION PICTURES</h1>
            <p class="hero-subtitle mt-3">DYNAMIC STORYTELLING THROUGH THE LENS</p>
        </div>
    </section>

    <section class="section-padding bg-darker" id="portfolio">
        <div class="container">
            <div class="tab-titles project-section gs-reveal">

                <p class="tab-link filter-tab" data-filter="Lifestyle">Lifestyle</p>
                <p class="tab-link filter-tab" data-filter="Events">Events</p>

            <div class="gallery-container" id="gallery-grid">
            </div>
        </div>

        <div id="load-more-container" class="text-center mt-5 w-100 gs-reveal" style="display: block;">
            <button id="load-more-btn" class="custom-btn" onclick="loadMoreProjects()">Load More<i
                    class="fa-solid fa-arrow-down ms-2" aria-hidden="true"></i></button>

    <footer class="py-5 text-center bg-darker border-top border-dark">
